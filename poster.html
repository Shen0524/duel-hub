<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>對決總入口 — QR 海報</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{background:#5b6b8c;font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
      display:flex;flex-direction:column;align-items:center;padding:24px}
    /* A4 直式海報 */
    .poster{width:210mm;min-height:297mm;background:#ffffff;color:#16213a;
      border-radius:8px;box-shadow:0 14px 50px rgba(0,0,0,.35);
      display:flex;flex-direction:column;align-items:center;text-align:center;
      padding:24mm 18mm;}
    .top-emoji{font-size:64px;line-height:1}
    h1{font-size:46px;font-weight:900;margin:10px 0 6px;letter-spacing:1px}
    .sub{font-size:23px;color:#3b5278;font-weight:700;margin:0 0 4px}
    .scanline{font-size:30px;font-weight:900;color:#16a34a;margin:18px 0 10px}
    .qrbox{padding:18px;border:4px solid #16213a;border-radius:20px;line-height:0;margin:6px 0 14px}
    .qrbox img,.qrbox canvas{display:block;width:360px;height:360px}
    .url{font-size:19px;font-weight:700;color:#1f3a64;word-break:break-all;
      background:#eef3fb;border:1px solid #cdd9ee;border-radius:10px;padding:10px 16px;margin-bottom:18px}
    .steps{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
    .step{flex:1;min-width:150px;max-width:200px;background:#f4f7fc;border:1px solid #dde6f3;border-radius:14px;padding:14px 10px}
    .step .n{display:inline-grid;place-items:center;width:32px;height:32px;border-radius:50%;
      background:#16213a;color:#fff;font-weight:900;margin-bottom:8px}
    .step .t{font-size:15px;font-weight:700;line-height:1.5}
    .topics{font-size:17px;color:#3b5278;line-height:2;font-weight:700;margin-top:6px}
    .topics b{color:#16213a}
    .foot{margin-top:auto;font-size:15px;color:#7385a6;padding-top:18px}
    .printbar{margin:18px 0 6px}
    .pbtn{background:#16a34a;color:#fff;border:none;border-radius:12px;padding:14px 26px;
      font-size:18px;font-weight:800;cursor:pointer;font-family:inherit}
    .pbtn:hover{filter:brightness(1.05)}
    .pnote{color:#e7edf7;font-size:14px;margin-top:8px;text-align:center}
    @media print{
      body{background:#fff;padding:0}
      .poster{box-shadow:none;border-radius:0;width:auto;min-height:auto;page-break-after:avoid}
      .printbar,.pnote{display:none}
      @page{size:A4;margin:0}
    }
  </style>
</head>
<body>
  <div class="printbar">
    <button class="pbtn" onclick="window.print()">🖨️ 列印 / 存成 PDF</button>
    <div class="pnote">按下後可直接列印，或在印表機選「另存為 PDF」。</div>
  </div>

  <div class="poster">
    <div class="top-emoji">🎮</div>
    <h1>食品衛生・營養 大對決</h1>
    <p class="sub">食安謠言 ‧ 營養謠言 ‧ GHP 三單元</p>

    <div class="scanline">📱 掃我，挑戰對手！</div>
    <div class="qrbox" id="qr"></div>
    <div class="url" id="url"></div>

    <div class="steps">
      <div class="step"><span class="n">1</span><div class="t">手機相機掃描 QR Code</div></div>
      <div class="step"><span class="n">2</span><div class="t">選一個主題、建立或加入房間</div></div>
      <div class="step"><span class="n">3</span><div class="t">兩人同時搶答，比快又比準！</div></div>
    </div>

    <div class="topics">
      🍱 <b>食安謠言</b>　🥗 <b>營養謠言</b><br>
      🏭 <b>GHP① 場區設施</b>　🧑‍🍳 <b>GHP② 人員衛生</b>　📦 <b>GHP③ 管理流程</b>
    </div>

    <div class="foot">掃 QR 即玩，無需安裝任何 App　·　雙人即時對戰</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    var URL_HUB = "https://shen0524.github.io/duel-hub/";
    document.getElementById("url").textContent = URL_HUB;
    new QRCode(document.getElementById("qr"), {
      text: URL_HUB, width: 360, height: 360,
      colorDark: "#16213a", colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
